<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="key">
        <div data-key="65" class="key">
            <kbd>A</kbd>
            <span class="sound">boom</span>
        </div>

        <div data-key="83" class="key">
            <kbd>S</kbd>
            <span class="sound">clap</span>
    
        </div>
        <div data-key="68" class="key">
            <kbd>D</kbd>
            <span class="sound">hat</span>
        </div>
        <div data-key="70" class="key">
            <kbd>F</kbd>
            <span class="sound">kick</span>
         </div>
        <div data-key="71" class="key">
            <kbd>G</kbd>
            <span class="sound">snare</span>
        </div>      
    </div> 
    <audio data-key="65" src="sound/boom.wav"></audio>
    <audio data-key="83" src="sound/clap.wav"></audio>
    <audio data-key="68" src="sound/hat.wav"></audio> 
    <audio data-key="70" src="sound/kick.wav"></audio>
    <audio data-key="71" src="sound/snare.wav"></audio>
    <script>
        window.addEventListener('keydown', function(e) {
            const audio = document.querySelector(`audio[data-key="${e.keyCode}"]`);
            const key = document.querySelector(`.key[data-key="${e.keyCode}"]`);
            if (!audio) return; // stop the function if no audio is found
            audio.currentTime = 0; // rewind to the start
            audio.play();
            key.classList.add('playing');
        });

        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            key.addEventListener('transitionend', function() {
                this.classList.remove('playing');
            });
        });
    </script>
</body>
</html>
